<!DOCTYPE html>
<html ng-app="adminApp">
<head>
  <title>User Management</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body ng-controller="UsersController" ng-init="loadUsers()">
  <header>
    <h1>User Management</h1>
    <div class="search-box">
      <input type="text" ng-model="searchQuery"
             ng-change="filterUsers()" placeholder="Search users...">
    </div>
  </header>

  <main>
    <table class="user-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="user in users"
            ng-click="selectUser(user)"
            ng-class="{ active: selectedUser.id === user.id }">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="status-indicator"
                  ng-class="user.active ? 'online' : 'offline'">
            </span>
            {{ user.active ? 'Active' : 'Inactive' }}
          </td>
          <td>
            <button ng-click="toggleUserStatus(user); $event.stopPropagation()"
                    class="btn btn-sm"
                    ng-class="user.active ? 'btn-warning' : 'btn-success'">
              {{ user.active ? 'Deactivate' : 'Activate' }}
            </button>
            <button ng-click="deleteUser(user.id); $event.stopPropagation()"
                    class="btn btn-danger btn-sm">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="user-details" ng-show="selectedUser" ng-controller="ReportsController">
      <h3>{{ selectedUser.name }} — Reports</h3>
      <div class="report-controls">
        <select ng-model="reportType">
          <option value="summary">Summary</option>
          <option value="detailed">Detailed</option>
          <option value="audit">Audit Trail</option>
        </select>
        <button ng-click="generateReport()" class="btn btn-primary">
          Generate
        </button>
        <button ng-click="exportReport('pdf')" class="btn btn-secondary"
                ng-disabled="!report">
          Export PDF
        </button>
      </div>

      <div class="report-content" ng-show="report">
        <pre>{{ report | json }}</pre>
      </div>
    </div>
  </main>
</body>
</html>
